[phases.setup]
nixPkgs = ["cabal-install", "ghc", "zlib", "zlib.dev", "pkg-config", "ncurses"]

[phases.build]
cmds = [
  "cabal update",
  # Manually point to the Nix-provided zlib paths
  "export PKG_CONFIG_PATH=$PKG_CONFIG_PATH:/nix/store/*-zlib-*/lib/pkgconfig",
  "cabal build --extra-include-dirs=/nix/store/*-zlib-dev-*/include --extra-lib-dirs=/nix/store/*-zlib-*/lib"
]

[start]
cmd = "cabal run imd-server"