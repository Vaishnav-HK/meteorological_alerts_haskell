[phases.setup]
nixPkgs = ["cabal-install", "ghc", "zlib", "zlib.dev", "pkg-config", "ncurses"]

[phases.build]
# We inject the paths directly into the build command
cmds = [
  "cabal update",
  "export PKG_CONFIG_PATH=$PKG_CONFIG_PATH:$(pkg-config --variable=pcfiledir zlib)",
  "cabal build --extra-include-dirs=$(pkg-config --variable=includedir zlib) --extra-lib-dirs=$(pkg-config --variable=libdir zlib)"
]

[start]
cmd = "cabal run imd-server"