[phases.setup]
# Standard Nix packages for Haskell compilation + C-library headers
nixPkgs = ["cabal-install", "ghc", "zlib", "zlib.dev", "pkg-config", "ncurses"]

[phases.build]
cmds = [
  "cabal update",
  # This single line resolves the paths and builds in one go to keep variables alive
  "cabal build --extra-include-dirs=$(pkg-config --variable=includedir zlib) --extra-lib-dirs=$(pkg-config --variable=libdir zlib)"
]

[start]
# Points to the executable name identified in your logs
cmd = "cabal run imd-server"

[variables]
# Assists the linker and pkg-config in finding the Nix-specific locations
PKG_CONFIG_PATH = "$PKG_CONFIG_PATH:/nix/var/nix/profiles/default/lib/pkgconfig"
LD_LIBRARY_PATH = "$LD_LIBRARY_PATH:/nix/var/nix/profiles/default/lib"