[phases.setup]
# Added 'stack' to the package list
nixPkgs = ["cabal-install", "ghc", "zlib", "zlib.dev", "pkg-config", "ncurses", "binutils", "haskellPackages.stack"]

[phases.build]
cmds = [
  # 1. Setup stack (this installs the specific GHC version needed)
  "stack setup",
  # 2. Build and Purge in one line to stay under 4GB
  """
  stack build --extra-include-dirs=$(pkg-config --variable=includedir zlib) \
              --extra-lib-dirs=$(pkg-config --variable=libdir zlib) && \
  mkdir -p ./output && \
  cp $(stack path --local-install-root)/bin/imd-server ./output/imd-server && \
  strip ./output/imd-server && \
  rm -rf .stack-work /root/.stack
  """
]

[start]
cmd = "./output/imd-server"

[variables]
PKG_CONFIG_PATH = "$PKG_CONFIG_PATH:/nix/var/nix/profiles/default/lib/pkgconfig"
LD_LIBRARY_PATH = "$LD_LIBRARY_PATH:/nix/var/nix/profiles/default/lib"