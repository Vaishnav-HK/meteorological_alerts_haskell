[phases.setup]
nixPkgs = ["cabal-install", "ghc", "zlib", "zlib.dev", "pkg-config", "ncurses", "binutils"]

[phases.build]
cmds = [
  "cabal update",
  # We combine everything into ONE shell execution to stay under the 4GB cap
  """
  cabal build --extra-include-dirs=$(pkg-config --variable=includedir zlib) \
              --extra-lib-dirs=$(pkg-config --variable=libdir zlib) \
              --disable-optimization && \
  mkdir -p ./output && \
  find dist-newstyle -name imd-server -type f -exec cp {} ./output/imd-server \\; && \
  strip ./output/imd-server && \
  rm -rf dist-newstyle /root/.cabal /root/.ghc
  """
]

[start]
# Runs the isolated, stripped binary
cmd = "./output/imd-server"

[variables]
PKG_CONFIG_PATH = "$PKG_CONFIG_PATH:/nix/var/nix/profiles/default/lib/pkgconfig"
LD_LIBRARY_PATH = "$LD_LIBRARY_PATH:/nix/var/nix/profiles/default/lib"